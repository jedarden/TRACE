apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-compactor
  namespace: trace
  labels:
    app: trace-compactor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trace-compactor
  template:
    metadata:
      labels:
        app: trace-compactor
    spec:
      containers:
        - name: compactor
          image: ghcr.io/jedarden/trace-compactor:latest
          imagePullPolicy: Always
          env:
            - name: TRACE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: bucket
            - name: TRACE_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: region
            - name: TRACE_S3_PREFIX
              value: trace-events
            - name: COMPACTOR_LOOKBACK_DAYS
              value: "7"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: secret-access-key
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
