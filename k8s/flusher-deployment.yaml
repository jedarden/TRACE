apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-flusher
  namespace: trace
  labels:
    app: trace-flusher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trace-flusher
  template:
    metadata:
      labels:
        app: trace-flusher
    spec:
      containers:
        - name: flusher
          image: ghcr.io/jedarden/trace-flusher:latest
          imagePullPolicy: Always
          env:
            - name: TRACE_LOG_DIR
              value: /data/logs
            - name: TRACE_DLQ_DIR
              value: /data/dlq
            - name: TRACE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: bucket
            - name: TRACE_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: region
            - name: TRACE_S3_PREFIX
              value: trace-events
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: trace-s3-credentials
                  key: secret-access-key
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: logs
              mountPath: /data/logs
            - name: dlq
              mountPath: /data/dlq
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: trace-logs
        - name: dlq
          persistentVolumeClaim:
            claimName: trace-dlq
