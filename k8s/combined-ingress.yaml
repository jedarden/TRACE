apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trace-combined
  namespace: trace
  labels:
    app: trace-combined
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: trace.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trace-combined
                port:
                  number: 8080
