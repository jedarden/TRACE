apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trace-collector-ci
  namespace: argo-workflows
  labels:
    app: trace-collector-ci
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: repo
        value: https://github.com/jedarden/TRACE.git
      - name: revision
        value: master
      - name: tag
        value: ""
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 8Gi
  volumes:
    - name: ghcr-config
      secret:
        secretName: ghcr-credentials
        items:
          - key: .dockerconfigjson
            path: config.json
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: checkout
            template: git-checkout
          - name: lint
            template: cargo-lint
            dependencies: [checkout]
          - name: build
            template: cargo-build
            dependencies: [lint]
          - name: docker
            template: docker-build-push
            dependencies: [build]
            when: "'{{workflow.parameters.tag}}' != ''"

    - name: git-checkout
      activeDeadlineSeconds: 300
      container:
        image: alpine/git:2.43.0
        command: [sh, -c]
        args:
          - |
            set -e
            REPO="{{workflow.parameters.repo}}"
            REPO_PATH="${REPO#https://}"
            git clone --depth 1 --branch "{{workflow.parameters.revision}}" \
              "https://x-access-token:${GH_TOKEN}@${REPO_PATH}" /workspace/src
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: cargo-lint
      activeDeadlineSeconds: 900
      container:
        image: rust:1.83-slim
        command: [bash, -c]
        args:
          - |
            set -e
            cd /workspace/src/collector
            export CARGO_TARGET_DIR=/workspace/target-lint
            cargo fmt --all -- --check
            cargo clippy --all-targets -- -D warnings
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

    - name: cargo-build
      activeDeadlineSeconds: 1800
      container:
        image: rust:1.83-slim
        command: [bash, -c]
        args:
          - |
            set -e
            cd /workspace/src/collector
            export CARGO_TARGET_DIR=/workspace/target
            cargo build --release
            echo "=== build successful ==="
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi

    - name: docker-build-push
      activeDeadlineSeconds: 1800
      container:
        image: gcr.io/kaniko-project/executor:v1.23.0-debug
        command: [/busybox/sh, -c]
        args:
          - |
            set -e
            TAG="{{workflow.parameters.tag}}"
            REGISTRY="ghcr.io/jedarden/trace-collector"

            DESTS="--destination=${REGISTRY}:${TAG}"

            # Stable release (vX.Y.Z): also push float tags and :latest
            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              MINOR=$(echo "$TAG" | sed 's/^v\([0-9]*\.[0-9]*\)\..*/\1/')
              MAJOR=$(echo "$TAG" | sed 's/^v\([0-9]*\)\..*/\1/')
              DESTS="${DESTS} --destination=${REGISTRY}:${MINOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:${MAJOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:latest"
            fi

            /kaniko/executor \
              --dockerfile=/workspace/src/collector/Dockerfile \
              --context=/workspace/src/collector \
              $DESTS \
              --cache=true \
              --cache-repo=${REGISTRY}/cache \
              --snapshot-mode=redo \
              --use-new-run=true
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: ghcr-config
            mountPath: /kaniko/.docker
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
