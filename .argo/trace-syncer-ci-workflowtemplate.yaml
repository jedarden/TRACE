apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trace-syncer-ci
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      CI pipeline for TRACE syncer service.
      Checks formatting, runs clippy, builds release binary, and builds Docker image.
spec:
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: checkout
            template: checkout
        - - name: fmt-check
            template: fmt-check
        - - name: clippy
            template: clippy
        - - name: build
            template: build
        - - name: docker
            template: docker

    - name: checkout
      script:
        image: alpine/git:latest
        command: [sh, -c]
        source: |
          set -e
          cd /workspace
          git clone https://github.com/jedarden/TRACE.git .
          git log -1 --oneline

    - name: fmt-check
      script:
        image: rust:1.83-alpine
        command: [sh, -c]
        source: |
          set -e
          cd /workspace/syncer
          apk add --no-cache musl-dev
          rustc --version
          cargo fmt --check

    - name: clippy
      script:
        image: rust:1.83-alpine
        command: [sh, -c]
        source: |
          set -e
          cd /workspace/syncer
          apk add --no-cache musl-dev
          cargo clippy --all-targets --all-features -- -D warnings

    - name: build
      script:
        image: rust:1.83-alpine
        command: [sh, -c]
        source: |
          set -e
          cd /workspace/syncer
          apk add --no-cache musl-dev
          cargo build --release
          ls -lh target/release/trace-syncer

    - name: docker
      script:
        image: gcr.io/kaniko-project/executor:v1.23.2-debug
        command: [sh, -c]
        source: |
          set -e
          cd /workspace
          /kaniko/executor \
            --dockerfile syncer/Dockerfile \
            --context dir:///workspace \
            --destination ghcr.io/jedarden/trace-syncer:latest \
            --cache=true \
            --cache-repo ghcr.io/jedarden/trace-syncer-cache

  volumes:
    - name: workspace
      emptyDir: {}
  volumeMounts:
    - name: workspace
      mountPath: /workspace
